app:
  runtime:
    name: nodejs20.x
  id: ari:cloud:ecosystem::app/78e0ff62-e76d-4e3e-9a20-bb510e4585ed

modules:
  trigger:
    - key: issue-created-trigger
      function: estimate-effort
      events:
        - avi:jira:created:issue

  function:
    - key: estimate-effort
      handler: index.run

permissions:
  scopes:
    - read:jira-work
    - write:jira-work

  external:
    fetch:
      backend:
        - api.openai.com
        - generativelanguage.googleapis.com
        - 192.168.1.5       